<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATS PRO FINAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#e2e8f0;
  padding:20px;
}
.section{
  background:#1e293b;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}
input, textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:6px;
  border:none;
  background:#334155;
  color:#fff;
}
button{
  padding:12px 20px;
  margin-top:10px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>ATS PRO (AUTO + EDITABLE)</h2>

<!-- 🔥 FALLBACK -->
<div class="section">
  <h3>Cargar ATS base manual (si no carga automático)</h3>
  <input type="file" id="fileBase" accept=".xlsx">
  <button onclick="cargarArchivo()">Cargar archivo</button>
</div>

<div class="section">
<h3>Información General</h3>
<input type="date" id="fecha_inicio">
<input type="date" id="fecha_fin">
<input id="lugar" placeholder="Lugar">
<textarea id="tipo_trabajo" placeholder="Tipo trabajo"></textarea>
</div>

<div class="section">
<h3>ATS</h3>
<textarea id="pasos" placeholder="Pasos"></textarea>
<textarea id="maquinas" placeholder="Máquinas"></textarea>
<textarea id="peligros" placeholder="Peligros"></textarea>
<textarea id="controles_ats" placeholder="Controles"></textarea>
</div>

<div class="section">
<h3>Herramientas</h3>
<input id="h_manuales" placeholder="Manuales">
<input id="h_electricas" placeholder="Eléctricas">
<textarea id="obs_herramientas" placeholder="Observaciones"></textarea>
</div>

<div class="section">
<h3>Trabajadores</h3>
<div id="workers"></div>
</div>

<button onclick="descargar()">Generar ATS</button>

<script>

const workersDiv = document.getElementById('workers');

function crearWorkers(lista=[]){
  workersDiv.innerHTML='';
  for(let i=0;i<11;i++){
    const w = lista[i] || {nombre:'',cedula:''};
    workersDiv.innerHTML += `
      <input id="n_${i}" value="${w.nombre||''}" placeholder="Nombre">
      <input id="c_${i}" value="${w.cedula||''}" placeholder="Cédula">
    `;
  }
}

function get(id){return document.getElementById(id).value}

function llenarFormulario(ws){

  const getCell = c => ws[c] ? ws[c].v : '';

  console.log("Cargando datos...");

  document.getElementById('fecha_inicio').value = getCell('J4');
  document.getElementById('fecha_fin').value = getCell('O4');
  document.getElementById('lugar').value = getCell('T4');

  document.getElementById('tipo_trabajo').value =
    (getCell('A5')||'').replace('TIPO DE TRABAJO: ','');

  document.getElementById('pasos').value = getCell('A8');
  document.getElementById('maquinas').value = getCell('F8');
  document.getElementById('peligros').value = getCell('H8');
  document.getElementById('controles_ats').value = getCell('O8');

  document.getElementById('h_manuales').value = getCell('F21');
  document.getElementById('h_electricas').value = getCell('F22');
  document.getElementById('obs_herramientas').value = getCell('S21');

  let workers=[];
  for(let i=0;i<11;i++){
    let row = 85+i;
    let nombre = getCell('B'+row);
    let cedula = getCell('L'+row);

    if(nombre || cedula){
      workers.push({nombre,cedula});
    }
  }

  crearWorkers(workers);
}

// 🔥 AUTO LOAD DESDE GITHUB
async function cargarBaseAuto(){
  try{
    const res = await fetch('./ATS_abril_2026.xlsx');
    if(!res.ok) throw new Error("No encontró archivo");

    const buffer = await res.arrayBuffer();
    const wb = XLSX.read(buffer,{type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];

    llenarFormulario(ws);

    console.log("✔ ATS cargado automático");

  }catch(e){
    console.warn("⚠ No cargó automático:", e.message);
  }
}

// 🔥 MANUAL
function cargarArchivo(){
  const file = document.getElementById('fileBase').files[0];
  if(!file) return alert("Selecciona archivo");

  const reader = new FileReader();
  reader.onload = function(e){
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data,{type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    llenarFormulario(ws);
  };
  reader.readAsArrayBuffer(file);
}

// 🔥 GENERAR ATS FINAL
async function descargar(){

  const res = await fetch('./ATS.xlsx');
  const buffer = await res.arrayBuffer();
  const wb = XLSX.read(buffer,{type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];

  const set = (c,v)=>{ if(!ws[c]) ws[c]={}; ws[c].v=v; ws[c].t='s'; }

  set('J4', get('fecha_inicio'));
  set('O4', get('fecha_fin'));
  set('T4', get('lugar'));
  set('A5', 'TIPO DE TRABAJO: '+get('tipo_trabajo'));

  set('A8', get('pasos'));
  set('F8', get('maquinas'));
  set('H8', get('peligros'));
  set('O8', get('controles_ats'));

  set('F21', get('h_manuales'));
  set('F22', get('h_electricas'));
  set('S21', get('obs_herramientas'));

  for(let i=0;i<11;i++){
    let r=85+i;
    set('B'+r, get('n_'+i));
    set('L'+r, get('c_'+i));
  }

  XLSX.writeFile(wb,'ATS_generado.xlsx');
}

// INIT
cargarBaseAuto();
crearWorkers();

</script>

</body>
</html>
