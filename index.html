<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ATS PRO FINAL</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
.section{background:#1e293b;padding:15px;margin-bottom:15px;border-radius:10px}
input,textarea{width:100%;margin:5px 0;padding:10px;background:#334155;color:#fff;border:none}
button{padding:12px;background:#22c55e;border:none;border-radius:8px;margin-top:10px}
canvas{background:#fff;border-radius:8px}
</style>
</head>

<body>

<h2>ATS PRO</h2>

<div id="estado">Cargando datos...</div>

<div class="section">
<h3>Información General</h3>
<input id="fecha_inicio">
<input id="fecha_fin">
<input id="lugar">
<textarea id="tipo_trabajo"></textarea>
</div>

<div class="section">
<h3>ATS</h3>
<textarea id="pasos"></textarea>
<textarea id="maquinas"></textarea>
<textarea id="peligros"></textarea>
<textarea id="controles"></textarea>
</div>

<div class="section">
<h3>Firma Digital</h3>
<canvas id="firma" width="300" height="150"></canvas>
<br>
<button onclick="limpiarFirma()">Limpiar firma</button>
</div>

<button onclick="generarATS()">Generar ATS</button>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyFp01db-QOQal8ywTzH2B_09j_KDIn630mhYoZ02AE4sC9eU49HM-mgBMA9RNZzHsn/exec";

// 🔥 FIRMA
const canvas = document.getElementById("firma");
const ctx = canvas.getContext("2d");

let dibujando = false;

canvas.addEventListener("mousedown",()=>dibujando=true);
canvas.addEventListener("mouseup",()=>dibujando=false);
canvas.addEventListener("mousemove",dibujar);

function dibujar(e){
  if(!dibujando) return;
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.strokeStyle = "black";
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
}

function limpiarFirma(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// 🔥 JSONP BASE
function cargarBase(){
  const s = document.createElement("script");
  s.src = URL + "?getBase=1&callback=llenar";
  document.body.appendChild(s);
}

function llenar(data){
  estado.innerText="Datos cargados ✔";

  fecha_inicio.value=data.fecha_inicio||"";
  fecha_fin.value=data.fecha_fin||"";
  lugar.value=data.lugar||"";
  tipo_trabajo.value=data.tipo_trabajo||"";
}

// 🔥 ENVIAR
function generarATS(){

  const firmaBase64 = canvas.toDataURL("image/png");

  const data = {
    fecha_inicio:fecha_inicio.value,
    fecha_fin:fecha_fin.value,
    lugar:lugar.value,
    tipo_trabajo:tipo_trabajo.value,
    pasos:pasos.value,
    maquinas:maquinas.value,
    peligros:peligros.value,
    controles:controles.value,
    firma:firmaBase64
  };

  const s = document.createElement("script");
  s.src = URL + "?postData=" + encodeURIComponent(JSON.stringify(data)) + "&callback=fin";
  document.body.appendChild(s);
}

function fin(r){
  alert("LISTO MIGUELITO 🚀");
  window.open(r.url);
}

cargarBase();

</script>

</body>
</html>
