<td colspan="5"><b>FIRMA</b></td>
</tr>

<tbody id="trabajadores"></tbody>

</table>

<script>

const URL = "TU_URL_AQUI";

// 🔥 CREAR FILAS TRABAJADORES
function crearTrabajadores(lista=[]){

  let html="";

  for(let i=0;i<10;i++){

    let w=lista[i]||{};

    html+=`
    <tr>
      <td colspan="2">${i+1}</td>
      <td colspan="8" contenteditable id="n_${i}">${w.nombre||""}</td>
      <td colspan="5" contenteditable id="c_${i}">${w.cedula||""}</td>
      <td colspan="5">
        <canvas id="firma_${i}" width="120" height="40"></canvas>
      </td>
    </tr>`;
  }

  document.getElementById("trabajadores").innerHTML=html;

  setTimeout(initFirmas,100);
}

// 🔥 FIRMAS
function initFirmas(){

  for(let i=0;i<10;i++){

    const c=document.getElementById("firma_"+i);
    const ctx=c.getContext("2d");

    let d=false;

    c.onmousedown=()=>d=true;
    c.onmouseup=()=>d=false;

    c.onmousemove=e=>{
      if(!d)return;
      ctx.lineTo(e.offsetX,e.offsetY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.offsetX,e.offsetY);
    };
  }
}

// 🔥 CARGAR BASE
function cargar(){

  const s=document.createElement("script");
  s.src=URL+"?getBase=1&callback=llenar";
  document.body.appendChild(s);
}

function llenar(data){

  J4.innerText=data.fecha_inicio;
  O4.innerText=data.fecha_fin;
  T4.innerText=data.lugar;
  A5.innerText=data.tipo_trabajo;

  A8.innerText=data.pasos;
  F8.innerText=data.maquinas;
  H8.innerText=data.peligros;
  O8.innerText=data.controles;

  F21.innerText=data.manuales;
  F22.innerText=data.electricas;
  F25.innerText=data.otros;

  A97.innerText=data.observaciones;

  crearTrabajadores(data.workers||[]);
}

cargar();

</script>
