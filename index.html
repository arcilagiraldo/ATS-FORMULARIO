<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ATS INTERACTIVO REAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  padding:20px;
}
#excel{
  background:#fff;
  border-radius:10px;
  padding:10px;
  overflow:auto;
}
td{
  border:1px solid #000;
  min-width:80px;
  height:25px;
  font-size:11px;
  padding:2px;
  cursor:pointer;
}
input{
  width:100%;
  border:none;
  outline:none;
}
button{
  margin-top:15px;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h2 style="color:white">ATS REAL (EDITABLE)</h2>

<div id="excel"></div>

<button onclick="enviar()">Generar ATS</button>

<script>

const URL_BACKEND = "https://script.google.com/macros/s/AKfycbyFp01db-QOQal8ywTzH2B_09j_KDIn630mhYoZ02AE4sC9eU49HM-mgBMA9RNZzHsn/exec";

let changes = {};
let worksheet;

// 🔥 CARGAR ATS REAL
async function cargar(){

  const res = await fetch('./ATS.xlsx');
  const buffer = await res.arrayBuffer();

  const wb = XLSX.read(buffer,{type:'array'});
  worksheet = wb.Sheets[wb.SheetNames[0]];

  render();
}

// 🔥 RENDER EXCEL
function render(){

  const range = XLSX.utils.decode_range(worksheet['!ref']);
  let html = "<table>";

  for(let R=range.s.r; R<=range.e.r; R++){
    html += "<tr>";

    for(let C=range.s.c; C<=range.e.c; C++){

      const ref = XLSX.utils.encode_cell({r:R,c:C});
      const val = worksheet[ref] ? worksheet[ref].v : "";

      html += `<td data-cell="${ref}">${val || ""}</td>`;
    }

    html += "</tr>";
  }

  html += "</table>";

  document.getElementById("excel").innerHTML = html;

  activarEdicion();
}

// 🔥 EDITAR COMO EXCEL
function activarEdicion(){

  document.querySelectorAll("td").forEach(td=>{

    td.onclick = () => {

      if(td.querySelector("input")) return;

      const val = td.innerText;

      td.innerHTML = `<input value="${val}">`;
      const input = td.querySelector("input");

      input.focus();

      input.onblur = () => {
        td.innerText = input.value;

        const cell = td.dataset.cell;
        changes[cell] = input.value;
      };
    };

  });

}

// 🔥 ENVIAR A APPS SCRIPT
async function enviar(){

  const res = await fetch(URL_BACKEND,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({changes})
  });

  const r = await res.json();

  alert("LISTO MIGUELITO 🚀");
  window.open(r.url);
}

cargar();

</script>

</body>
</html>
