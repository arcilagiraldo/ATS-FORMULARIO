<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ATS FINAL</title>

<style>
body{background:#0f172a;margin:0;padding:20px;font-family:Arial}
.wrap{background:#fff;padding:10px;overflow:auto}
.grid{
display:grid;
grid-template-columns:80px repeat(11,120px);
border:1px solid #000;
}
.cell{
border:1px solid #000;
font-size:11px;
padding:3px;
min-height:25px;
}
.center{display:flex;align-items:center;justify-content:center;font-weight:bold}
input,textarea{width:100%;border:none;font-size:11px}
textarea{resize:none;height:100%}
canvas{border:1px solid #000;background:#fff}
button{margin-top:15px;padding:10px 20px;background:#22c55e;border:none;border-radius:8px}
.logo{width:70px}
</style>
</head>

<body>

<div class="wrap">
<div class="grid" id="g"></div>
</div>

<button onclick="generar()">GENERAR ATS</button>

<script>

const URL="https://script.google.com/macros/s/AKfycbyFp01db-QOQal8ywTzH2B_09j_KDIn630mhYoZ02AE4sC9eU49HM-mgBMA9RNZzHsn/exec";
const g=document.getElementById("g");

function c(span,html=""){return `<div class="cell" style="grid-column:span ${span}">${html}</div>`;}

function render(d={}){

g.innerHTML="";

/* HEADER */
g.innerHTML+=c(1,`<img class="logo" src="https://cdn-icons-png.flaticon.com/512/1048/1048946.png">`);
g.innerHTML+=c(8,"<b>ANÁLISIS DE TRABAJO SEGURO</b>");
g.innerHTML+=c(3,"Código: FOR-SST-04");

g.innerHTML+=c(9,"");
g.innerHTML+=c(3,"Versión: 1");

g.innerHTML+=c(9,"");
g.innerHTML+=c(3,"Vigencia: 14/02/2026");

/* FECHAS */
g.innerHTML+=c(2,"FECHA INICIO");
g.innerHTML+=c(4,`<input id="fi" value="${d.fecha_inicio||""}">`);
g.innerHTML+=c(2,"FECHA FIN");
g.innerHTML+=c(4,`<input id="ff" value="${d.fecha_fin||""}">`);

/* LUGAR */
g.innerHTML+=c(2,"LUGAR");
g.innerHTML+=c(10,`<input id="lugar" value="${d.lugar||""}">`);

/* TIPO */
g.innerHTML+=c(2,"TIPO TRABAJO");
g.innerHTML+=c(10,`<textarea id="tipo">${d.tipo_trabajo||""}</textarea>`);

/* TITULOS */
g.innerHTML+=c(3,"SECUENCIA");
g.innerHTML+=c(3,"MAQUINAS");
g.innerHTML+=c(3,"PELIGROS");
g.innerHTML+=c(3,"CONTROLES");

/* BLOQUES */
g.innerHTML+=c(3,`<textarea id="pasos">${d.pasos||""}</textarea>`);
g.innerHTML+=c(3,`<textarea id="maq">${d.maquinas||""}</textarea>`);
g.innerHTML+=c(3,`<textarea id="pel">${d.peligros||""}</textarea>`);
g.innerHTML+=c(3,`<textarea id="con">${d.controles||""}</textarea>`);

/* TRABAJADORES */
g.innerHTML+=c(12,"<b>TRABAJADORES</b>");

for(let i=0;i<10;i++){

let w=d.workers?.[i]||{};

g.innerHTML+=c(1,(i+1));
g.innerHTML+=c(3,`<input id="n_${i}" value="${w.nombre||""}">`);
g.innerHTML+=c(3,`<input id="c_${i}" value="${w.cedula||""}">`);
g.innerHTML+=c(5,`
<canvas id="f_${i}" width="150" height="60"></canvas>
<button onclick="cl(${i})">X</button>
`);
}

/* OBS */
g.innerHTML+=c(12,"OBSERVACIONES");
g.innerHTML+=c(12,`<textarea id="obs">${d.observaciones||""}</textarea>`);

setTimeout(firmas,200);
}

function firmas(){
for(let i=0;i<10;i++){
let c=document.getElementById("f_"+i);
let x=c.getContext("2d");
let d=false;
c.onmousedown=()=>d=true;
c.onmouseup=()=>d=false;
c.onmousemove=e=>{
if(!d)return;
x.lineWidth=2;
x.lineTo(e.offsetX,e.offsetY);
x.stroke();
x.beginPath();
x.moveTo(e.offsetX,e.offsetY);
};
}
}

function cl(i){
let c=document.getElementById("f_"+i);
c.getContext("2d").clearRect(0,0,c.width,c.height);
}

function cargar(){
let s=document.createElement("script");
s.src=URL+"?getBase=1&callback=render";
document.body.appendChild(s);
}

function generar(){

let w=[];

for(let i=0;i<10;i++){
w.push({
nombre:document.getElementById("n_"+i).value,
cedula:document.getElementById("c_"+i).value,
firma:document.getElementById("f_"+i).toDataURL()
});
}

let data={
fecha_inicio:fi.value,
fecha_fin:ff.value,
lugar:lugar.value,
tipo_trabajo:tipo.value,
pasos:pasos.value,
maquinas:maq.value,
peligros:pel.value,
controles:con.value,
observaciones:obs.value,
workers:w
};

let s=document.createElement("script");
s.src=URL+"?postData="+encodeURIComponent(JSON.stringify(data))+"&callback=fin";
document.body.appendChild(s);
}

function fin(r){
alert("LISTO MIGUELITO 🚀");
window.open(r.url);
}

cargar();

</script>

</body>
</html>
