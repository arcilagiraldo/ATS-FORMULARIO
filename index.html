<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATS</title>
</head>

<body>

<h2>ATS</h2>

<input id="fi" placeholder="Fecha inicio">
<input id="ff" placeholder="Fecha fin">
<input id="lugar" placeholder="Lugar">

<br><br>

<textarea id="tipo" placeholder="Tipo trabajo"></textarea>
<textarea id="pasos" placeholder="Pasos"></textarea>
<textarea id="maq" placeholder="Maquinas"></textarea>
<textarea id="pel" placeholder="Peligros"></textarea>
<textarea id="con" placeholder="Controles"></textarea>
<textarea id="obs" placeholder="Observaciones"></textarea>

<br><br>

<button onclick="enviar()">GENERAR ATS</button>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyFp01db-QOQal8ywTzH2B_09j_KDIn630mhYoZ02AE4sC9eU49HM-mgBMA9RNZzHsn/exec";

function enviar(){

const data = {
fi: document.getElementById("fi").value,
ff: document.getElementById("ff").value,
lugar: document.getElementById("lugar").value,
tipo: document.getElementById("tipo").value,
pasos: document.getElementById("pasos").value,
maq: document.getElementById("maq").value,
pel: document.getElementById("pel").value,
con: document.getElementById("con").value,
obs: document.getElementById("obs").value
};

fetch(URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(r=>{
alert("LISTO MIGUELITO 🚀");
window.open(r.url);
});

}

</script>

</body>
</html>
