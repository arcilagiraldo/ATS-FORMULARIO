<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATS PRO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;padding:20px;background:#111;color:#eee}
input,textarea{width:100%;margin:5px 0;padding:8px}
button{padding:10px 20px;margin-top:10px}
</style>
</head>
<body>

<h2>ATS PRO (Plantilla real)</h2>

<label>Fecha inicio</label>
<input type="date" id="fecha_inicio">

<label>Fecha fin</label>
<input type="date" id="fecha_fin">

<label>Lugar</label>
<input type="text" id="lugar" value="Obra Norte - Antioquia">

<label>Tipo de trabajo</label>
<textarea id="tipo_trabajo">Obra civil</textarea>

<label>Pasos</label>
<textarea id="pasos"></textarea>

<label>Máquinas</label>
<textarea id="maquinas"></textarea>

<label>Peligros</label>
<textarea id="peligros"></textarea>

<label>Controles</label>
<textarea id="controles_ats"></textarea>

<h3>Trabajadores</h3>
<div id="workers"></div>

<button onclick="descargar()">Descargar ATS</button>

<script>

const workersDiv = document.getElementById('workers');
for(let i=0;i<5;i++){
  workersDiv.innerHTML += `
    <input placeholder="Nombre" id="n_${i}">
    <input placeholder="Cédula" id="c_${i}">
  `;
}

function get(id){return document.getElementById(id).value}

function collect(){
  let workers=[];
  for(let i=0;i<5;i++){
    workers.push({
      nombre:get('n_'+i),
      cedula:get('c_'+i)
    })
  }

  return {
    fecha_inicio:get('fecha_inicio'),
    fecha_fin:get('fecha_fin'),
    lugar:get('lugar'),
    tipo_trabajo:get('tipo_trabajo'),
    pasos:get('pasos'),
    maquinas:get('maquinas'),
    peligros:get('peligros'),
    controles_ats:get('controles_ats'),
    workers
  }
}

async function generar(data){
  const res = await fetch('ATS.xlsx');
  const buffer = await res.arrayBuffer();
  const wb = XLSX.read(buffer, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];

  const set = (c,v)=>{ if(!ws[c]) ws[c]={}; ws[c].v=v; ws[c].t='s'; }

  set('J4', data.fecha_inicio);
  set('O4', data.fecha_fin);
  set('T4', data.lugar);
  set('A5', 'TIPO DE TRABAJO: '+data.tipo_trabajo);

  set('A8', data.pasos);
  set('F8', data.maquinas);
  set('H8', data.peligros);
  set('O8', data.controles_ats);

  data.workers.forEach((w,i)=>{
    let r=85+i;
    set('B'+r,w.nombre);
    set('L'+r,w.cedula);
  });

  return wb;
}

async function descargar(){
  const data = collect();
  const wb = await generar(data);
  XLSX.writeFile(wb,'ATS_generado.xlsx');
}

</script>

</body>
</html>
