<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATS PRO FINAL</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}
input,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}
button{
  background:#22c55e;
  color:white;
  padding:10px;
  border:none;
  cursor:pointer;
}
iframe{
  margin-top:20px;
  border:2px solid #ccc;
  width:100%;
  height:800px;
  background:white;
}
</style>

</head>

<body>

<h2>ATS PRO (REAL)</h2>

<input id="fi" placeholder="Fecha inicio">
<input id="ff" placeholder="Fecha fin">
<input id="lugar" placeholder="Lugar">

<textarea id="tipo" placeholder="Tipo trabajo"></textarea>
<textarea id="pasos" placeholder="Pasos"></textarea>
<textarea id="maq" placeholder="Máquinas"></textarea>
<textarea id="pel" placeholder="Peligros"></textarea>
<textarea id="con" placeholder="Controles"></textarea>
<textarea id="obs" placeholder="Observaciones"></textarea>

<button onclick="generar()">GENERAR ATS</button>

<!-- 🔥 ATS REAL -->
<iframe id="visor"
src="https://docs.google.com/spreadsheets/d/1nb-PX8mkBM7lXFstMomjjtje1lVb_i0Q/edit?rm=minimal">
</iframe>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyFp01db-QOQal8ywTzH2B_09j_KDIn630mhYoZ02AE4sC9eU49HM-mgBMA9RNZzHsn/exec";

// 🔹 PRECARGAR AUTOMÁTICO
fetch(URL+"?getBase=1")
.then(r=>r.json())
.then(d=>{
fi.value=d.fi||"";
ff.value=d.ff||"";
lugar.value=d.lugar||"";
tipo.value=d.tipo||"";
pasos.value=d.pasos||"";
maq.value=d.maq||"";
pel.value=d.pel||"";
con.value=d.con||"";
obs.value=d.obs||"";
});

// 🔹 GENERAR ATS
function generar(){

const data={
fi:fi.value,
ff:ff.value,
lugar:lugar.value,
tipo:tipo.value,
pasos:pasos.value,
maq:maq.value,
pel:pel.value,
con:con.value,
obs:obs.value
};

fetch(URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(r=>{
alert("LISTO MIGUELITO 🚀");

// 🔥 ABRE EN DRIVE
window.open(r.url);

// 🔥 DESCARGA AUTOMÁTICA
window.open(r.download);

});

}

</script>

</body>
</html>
