<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATS PRO VISUAL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;padding:20px;background:#0f172a;color:#e2e8f0}
.section{border:1px solid #334155;padding:15px;margin-bottom:15px;border-radius:10px;background:#1e293b}
h3{margin-top:0}
input,textarea{width:100%;margin:5px 0;padding:8px;border-radius:6px;border:none;background:#334155;color:#fff}
button{padding:12px 20px;margin-top:15px;background:#22c55e;border:none;border-radius:8px;color:#000;font-weight:bold;cursor:pointer}
button:hover{opacity:0.9}
</style>
</head>
<body>

<h2>ATS PRO (VISUAL + EDITABLE)</h2>

<div class="section">
<h3>Información General</h3>
<label>Fecha inicio</label>
<input type="date" id="fecha_inicio">
<label>Fecha fin</label>
<input type="date" id="fecha_fin">
<label>Lugar</label>
<input id="lugar">
<label>Tipo de trabajo</label>
<textarea id="tipo_trabajo"></textarea>
</div>

<div class="section">
<h3>ATS</h3>
<label>Pasos</label>
<textarea id="pasos"></textarea>
<label>Máquinas</label>
<textarea id="maquinas"></textarea>
<label>Peligros</label>
<textarea id="peligros"></textarea>
<label>Controles</label>
<textarea id="controles_ats"></textarea>
</div>

<div class="section">
<h3>Herramientas</h3>
<label>Manuales</label>
<input id="h_manuales">
<label>Eléctricas</label>
<input id="h_electricas">
<label>Observaciones</label>
<textarea id="obs_herramientas"></textarea>
</div>

<div class="section">
<h3>Trabajadores (editable)</h3>
<div id="workers"></div>
</div>

<button onclick="descargar()">Generar ATS</button>

<script>

const workersDiv = document.getElementById('workers');

function crearWorkers(lista=[]){
  workersDiv.innerHTML='';
  for(let i=0;i<11;i++){
    const w = lista[i] || {nombre:'',cedula:''};
    workersDiv.innerHTML += `
      <div style="margin-bottom:10px">
        <input placeholder="Nombre" id="n_${i}" value="${w.nombre||''}">
        <input placeholder="Cédula" id="c_${i}" value="${w.cedula||''}">
      </div>
    `;
  }
}

function get(id){return document.getElementById(id).value}

function collect(){
  let workers=[];
  for(let i=0;i<11;i++){
    workers.push({
      nombre:get('n_'+i),
      cedula:get('c_'+i)
    })
  }

  return {
    fecha_inicio:get('fecha_inicio'),
    fecha_fin:get('fecha_fin'),
    lugar:get('lugar'),
    tipo_trabajo:get('tipo_trabajo'),
    pasos:get('pasos'),
    maquinas:get('maquinas'),
    peligros:get('peligros'),
    controles_ats:get('controles_ats'),
    h_manuales:get('h_manuales'),
    h_electricas:get('h_electricas'),
    obs_herramientas:get('obs_herramientas'),
    workers
  }
}

async function cargarBase(){
  const res = await fetch('ATS_abril_2026.xlsx');
  const buffer = await res.arrayBuffer();
  const wb = XLSX.read(buffer,{type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];

  const getCell = c => ws[c] ? ws[c].v : '';

  document.getElementById('fecha_inicio').value = getCell('J4');
  document.getElementById('fecha_fin').value = getCell('O4');
  document.getElementById('lugar').value = getCell('T4');
  document.getElementById('tipo_trabajo').value = (getCell('A5')||'').replace('TIPO DE TRABAJO: ','');

  document.getElementById('pasos').value = getCell('A8');
  document.getElementById('maquinas').value = getCell('F8');
  document.getElementById('peligros').value = getCell('H8');
  document.getElementById('controles_ats').value = getCell('O8');

  document.getElementById('h_manuales').value = getCell('F21');
  document.getElementById('h_electricas').value = getCell('F22');
  document.getElementById('obs_herramientas').value = getCell('S21');

  let workers=[];
  for(let i=0;i<11;i++){
    let row = 85+i;
    let nombre = getCell('B'+row);
    let cedula = getCell('L'+row);

    if(nombre || cedula){
      workers.push({nombre,cedula});
    }
  }

  crearWorkers(workers);
}

async function generar(data){
  const res = await fetch('ATS.xlsx');
  const buffer = await res.arrayBuffer();
  const wb = XLSX.read(buffer,{type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];

  const set = (c,v)=>{ if(!ws[c]) ws[c]={}; ws[c].v=v; ws[c].t='s'; }

  set('J4', data.fecha_inicio);
  set('O4', data.fecha_fin);
  set('T4', data.lugar);
  set('A5', 'TIPO DE TRABAJO: '+data.tipo_trabajo);

  set('A8', data.pasos);
  set('F8', data.maquinas);
  set('H8', data.peligros);
  set('O8', data.controles_ats);

  set('F21', data.h_manuales);
  set('F22', data.h_electricas);
  set('S21', data.obs_herramientas);

  data.workers.forEach((w,i)=>{
    let r=85+i;
    set('B'+r,w.nombre);
    set('L'+r,w.cedula);
  });

  return wb;
}

async function descargar(){
  const data = collect();
  const wb = await generar(data);
  XLSX.writeFile(wb,'ATS_generado.xlsx');
}

cargarBase();

</script>

</body>
</html>
