<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ATS INTERACTIVO PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  padding:20px;
}

#excel{
  background:#fff;
  overflow:auto;
  border-radius:10px;
  padding:10px;
}

td{
  border:1px solid #000;
  min-width:80px;
  height:25px;
  font-size:11px;
  padding:2px;
  cursor:pointer;
}

td.active{
  outline:2px solid #22c55e;
}

input.cell-edit{
  width:100%;
  height:100%;
  border:none;
  outline:none;
}
button{
  margin-top:15px;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2 style="color:white">ATS INTERACTIVO</h2>

<div id="excel"></div>

<button onclick="enviar()">Generar ATS</button>

<script>

const URL_BACKEND = "https://script.google.com/macros/s/AKfycbyFp01db-QOQal8ywTzH2B_09j_KDIn630mhYoZ02AE4sC9eU49HM-mgBMA9RNZzHsn/exec";

let sheetData = {};
let worksheet;

// 🔥 CARGAR EXCEL
async function cargar(){

  const res = await fetch('./ATS.xlsx');
  const buffer = await res.arrayBuffer();

  const wb = XLSX.read(buffer,{type:'array'});
  worksheet = wb.Sheets[wb.SheetNames[0]];

  render();
}

// 🔥 RENDER REAL
function render(){

  const range = XLSX.utils.decode_range(worksheet['!ref']);
  let html = "<table>";

  for(let R=range.s.r; R<=range.e.r; ++R){
    html += "<tr>";

    for(let C=range.s.c; C<=range.e.c; ++C){

      const cellRef = XLSX.utils.encode_cell({r:R,c:C});
      const cell = worksheet[cellRef];

      let value = cell ? cell.v : "";

      html += `<td data-cell="${cellRef}">${value || ""}</td>`;
    }

    html += "</tr>";
  }

  html += "</table>";

  document.getElementById("excel").innerHTML = html;

  activarEdicion();
}

// 🔥 EDICIÓN TIPO EXCEL
function activarEdicion(){

  document.querySelectorAll("td").forEach(td=>{

    td.addEventListener("click",()=>{

      if(td.querySelector("input")) return;

      const value = td.innerText;
      td.classList.add("active");

      td.innerHTML = `<input class="cell-edit" value="${value}">`;

      const input = td.querySelector("input");
      input.focus();

      input.addEventListener("blur",()=>{
        const newVal = input.value;
        td.innerText = newVal;
        td.classList.remove("active");

        const cell = td.dataset.cell;
        sheetData[cell] = newVal;
      });

    });

  });

}

// 🔥 ENVIAR CAMBIOS
async function enviar(){

  const res = await fetch(URL_BACKEND,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({changes: sheetData})
  });

  const r = await res.json();

  alert("LISTO MIGUELITO 🚀");
  window.open(r.url);
}

cargar();

</script>

</body>
</html>
