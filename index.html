<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATS REAL</title>

<style>
body{
  font-family: Arial;
  margin:20px;
}
input,textarea{
  width:250px;
  margin:3px;
}
iframe{
  width:100%;
  height:800px;
  margin-top:20px;
  border:1px solid #000;
}
</style>

</head>

<body>

<h2>ATS</h2>

<input id="fi" placeholder="Fecha inicio">
<input id="ff" placeholder="Fecha fin">
<input id="lugar" placeholder="Lugar">

<br>

<textarea id="tipo" placeholder="Tipo trabajo"></textarea>
<textarea id="pasos" placeholder="Pasos"></textarea>
<textarea id="maq" placeholder="Máquinas"></textarea>
<textarea id="pel" placeholder="Peligros"></textarea>
<textarea id="con" placeholder="Controles"></textarea>
<textarea id="obs" placeholder="Observaciones"></textarea>

<br><br>

<button onclick="generar()">GENERAR ATS</button>

<!-- 🔥 ESTE ES EL ATS REAL (NO HTML INVENTADO) -->
<iframe id="visor"
src="https://docs.google.com/spreadsheets/d/1PvJipRBnpjakr_2Y22c3xF168m7B_SJB/preview">
</iframe>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyFp01db-QOQal8ywTzH2B_09j_KDIn630mhYoZ02AE4sC9eU49HM-mgBMA9RNZzHsn/exec";

// 🔹 PRECARGA REAL
fetch(URL+"?getBase=1")
.then(r=>r.json())
.then(d=>{
fi.value=d.fi||"";
ff.value=d.ff||"";
lugar.value=d.lugar||"";
tipo.value=d.tipo||"";
pasos.value=d.pasos||"";
maq.value=d.maq||"";
pel.value=d.pel||"";
con.value=d.con||"";
obs.value=d.obs||"";
});

// 🔹 GENERAR
function generar(){

const data={
fi:fi.value,
ff:ff.value,
lugar:lugar.value,
tipo:tipo.value,
pasos:pasos.value,
maq:maq.value,
pel:pel.value,
con:con.value,
obs:obs.value
};

fetch(URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(r=>{
alert("LISTO MIGUELITO");

// abrir archivo real
window.open(r.url);

// descargar
window.open(r.download);

// actualizar visor al nuevo ATS
document.getElementById("visor").src =
"https://docs.google.com/spreadsheets/d/"+r.url.split("/d/")[1].split("/")[0]+"/preview";

});

}

</script>

</body>
</html>
