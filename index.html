<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ATS PRO FINAL</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
.section{background:#1e293b;padding:15px;margin-bottom:15px;border-radius:10px}
input,textarea{width:100%;margin:5px 0;padding:10px;background:#334155;color:#fff;border:none}
button{padding:12px;background:#22c55e;border:none;border-radius:8px}
#debug{background:#111;padding:10px;margin-bottom:10px;font-size:12px}
</style>
</head>

<body>

<h2>ATS PRO</h2>

<div id="debug">Cargando datos...</div>

<div class="section">
<h3>Información General</h3>
<input id="fecha_inicio">
<input id="fecha_fin">
<input id="lugar">
<textarea id="tipo_trabajo"></textarea>
</div>

<div class="section">
<h3>ATS</h3>
<textarea id="pasos"></textarea>
<textarea id="maquinas"></textarea>
<textarea id="peligros"></textarea>
<textarea id="controles"></textarea>
</div>

<div class="section">
<h3>Herramientas</h3>
<input id="manuales">
<input id="electricas">
<input id="otros">
</div>

<div class="section">
<h3>Observaciones</h3>
<textarea id="observaciones"></textarea>
</div>

<div class="section">
<h3>Trabajadores</h3>
<div id="workers"></div>
</div>

<button onclick="generarATS()">Generar ATS</button>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyFp01db-QOQal8ywTzH2B_09j_KDIn630mhYoZ02AE4sC9eU49HM-mgBMA9RNZzHsn/exec";

// 🔥 CREAR TRABAJADORES
function crearWorkers(lista=[]){
  let html="";
  for(let i=0;i<10;i++){
    let w = lista[i] || {};
    html += `
      <input id="n_${i}" value="${w.nombre||''}" placeholder="Nombre">
      <input id="c_${i}" value="${w.cedula||''}" placeholder="Cédula">
    `;
  }
  document.getElementById("workers").innerHTML = html;
}

// 🔥 CARGAR BASE (CORREGIDO)
async function cargarBase(){

  try{

    const res = await fetch(URL + "?getBase=1");

    const text = await res.text();

    const data = JSON.parse(text);

    document.getElementById("debug").innerText = "Datos cargados ✔";

    fecha_inicio.value = data.fecha_inicio || "";
    fecha_fin.value = data.fecha_fin || "";
    lugar.value = data.lugar || "";
    tipo_trabajo.value = data.tipo_trabajo || "";

    pasos.value = data.pasos || "";
    maquinas.value = data.maquinas || "";
    peligros.value = data.peligros || "";
    controles.value = data.controles || "";

    manuales.value = data.manuales || "";
    electricas.value = data.electricas || "";
    otros.value = data.otros || "";

    observaciones.value = data.observaciones || "";

    crearWorkers(data.workers || []);

  }catch(e){
    document.getElementById("debug").innerText = "ERROR: " + e;
  }
}

// 🔥 ENVIAR
async function generarATS(){

  const workers = [];

  for(let i=0;i<10;i++){
    workers.push({
      nombre:document.getElementById("n_"+i).value,
      cedula:document.getElementById("c_"+i).value
    });
  }

  const data = {
    fecha_inicio:fecha_inicio.value,
    fecha_fin:fecha_fin.value,
    lugar:lugar.value,
    tipo_trabajo:tipo_trabajo.value,
    pasos:pasos.value,
    maquinas:maquinas.value,
    peligros:peligros.value,
    controles:controles.value,
    manuales:manuales.value,
    electricas:electricas.value,
    otros:otros.value,
    observaciones:observaciones.value,
    workers
  };

  const res = await fetch(URL,{
    method:"POST",
    body: JSON.stringify(data)
  });

  const text = await res.text();
  const r = JSON.parse(text);

  alert("LISTO MIGUELITO 🚀");
  window.open(r.url);
}

cargarBase();

</script>

</body>
</html>
