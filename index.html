<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATS PRO FINAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#e2e8f0;
  padding:20px;
}
.section{
  background:#1e293b;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}
input, textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:6px;
  border:none;
  background:#334155;
  color:#fff;
}
button{
  padding:12px 20px;
  margin-top:10px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
button:hover{opacity:0.9}
</style>
</head>

<body>

<h2>ATS PRO (APPS SCRIPT)</h2>

<!-- 🔥 FALLBACK -->
<div class="section">
  <h3>Cargar ATS base manual (opcional)</h3>
  <input type="file" id="fileBase" accept=".xlsx">
  <button onclick="cargarArchivo()">Cargar archivo</button>
</div>

<div class="section">
<h3>Información General</h3>
<input type="date" id="fecha_inicio">
<input type="date" id="fecha_fin">
<input id="lugar" placeholder="Lugar">
<textarea id="tipo_trabajo" placeholder="Tipo trabajo"></textarea>
</div>

<div class="section">
<h3>ATS</h3>
<textarea id="pasos" placeholder="Pasos"></textarea>
<textarea id="maquinas" placeholder="Máquinas"></textarea>
<textarea id="peligros" placeholder="Peligros"></textarea>
<textarea id="controles_ats" placeholder="Controles"></textarea>
</div>

<div class="section">
<h3>Herramientas</h3>
<input id="h_manuales" placeholder="Manuales">
<input id="h_electricas" placeholder="Eléctricas">
<textarea id="obs_herramientas" placeholder="Observaciones"></textarea>
</div>

<div class="section">
<h3>Trabajadores</h3>
<div id="workers"></div>
</div>

<button onclick="generarATS()">Generar ATS en Drive</button>

<script>

// 🔥 TU URL DE APPS SCRIPT
const URL_BACKEND = "https://script.google.com/macros/s/AKfycbyFp01db-QOQal8ywTzH2B_09j_KDIn630mhYoZ02AE4sC9eU49HM-mgBMA9RNZzHsn/exec";

const workersDiv = document.getElementById('workers');

// crear inputs siempre
function crearWorkers(lista=[]){
  workersDiv.innerHTML='';
  for(let i=0;i<11;i++){
    const w = lista[i] || {nombre:'',cedula:''};
    workersDiv.innerHTML += `
      <input id="n_${i}" value="${w.nombre||''}" placeholder="Nombre">
      <input id="c_${i}" value="${w.cedula||''}" placeholder="Cédula">
    `;
  }
}

function get(id){return document.getElementById(id).value}

// llenar formulario desde excel
function llenarFormulario(ws){
  const getCell = c => ws[c] ? ws[c].v : '';

  document.getElementById('fecha_inicio').value = getCell('J4');
  document.getElementById('fecha_fin').value = getCell('O4');
  document.getElementById('lugar').value = getCell('T4');

  document.getElementById('tipo_trabajo').value =
    (getCell('A5')||'').replace('TIPO DE TRABAJO: ','');

  document.getElementById('pasos').value = getCell('A8');
  document.getElementById('maquinas').value = getCell('F8');
  document.getElementById('peligros').value = getCell('H8');
  document.getElementById('controles_ats').value = getCell('O8');

  document.getElementById('h_manuales').value = getCell('F21');
  document.getElementById('h_electricas').value = getCell('F22');
  document.getElementById('obs_herramientas').value = getCell('S21');

  let workers=[];
  for(let i=0;i<11;i++){
    let row = 85+i;
    let nombre = getCell('B'+row);
    let cedula = getCell('L'+row);

    if(nombre || cedula){
      workers.push({nombre,cedula});
    }
  }

  crearWorkers(workers);
}

// 🔥 AUTO LOAD DESDE GITHUB
async function cargarBaseAuto(){
  try{
    const res = await fetch('./ATS_abril_2026.xlsx');
    if(!res.ok) throw new Error("No encontrado");

    const buffer = await res.arrayBuffer();
    const wb = XLSX.read(buffer,{type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];

    llenarFormulario(ws);

    console.log("✔ ATS cargado automático");

  }catch(e){
    console.warn("⚠ No cargó automático");
  }
}

// 🔥 MANUAL
function cargarArchivo(){
  const file = document.getElementById('fileBase').files[0];
  if(!file) return alert("Selecciona archivo");

  const reader = new FileReader();
  reader.onload = function(e){
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data,{type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    llenarFormulario(ws);
  };
  reader.readAsArrayBuffer(file);
}

// recolectar datos
function collect(){

  let workers=[];
  for(let i=0;i<11;i++){
    workers.push({
      nombre:get('n_'+i),
      cedula:get('c_'+i)
    });
  }

  return {
    fecha_inicio:get('fecha_inicio'),
    fecha_fin:get('fecha_fin'),
    lugar:get('lugar'),
    tipo_trabajo:get('tipo_trabajo'),
    pasos:get('pasos'),
    maquinas:get('maquinas'),
    peligros:get('peligros'),
    controles_ats:get('controles_ats'),
    h_manuales:get('h_manuales'),
    h_electricas:get('h_electricas'),
    obs_herramientas:get('obs_herramientas'),
    workers
  };
}

// 🔥 ENVÍO AL BACKEND
async function generarATS(){

  const data = collect();

  const response = await fetch(URL_BACKEND, {
    method: "POST",
    body: JSON.stringify(data)
  });

  const result = await response.json();

  alert("ATS generado correctamente");
  window.open(result.url, "_blank");
}

// INIT
crearWorkers();
cargarBaseAuto();

</script>

</body>
</html>
