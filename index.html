<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ATS PRO FINAL</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  padding:20px;
}
.section{
  background:#1e293b;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}
input,textarea{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:#334155;
  color:#fff;
  border:none;
}
button{
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>ATS PRO</h2>

<div class="section">
<h3>Información General</h3>
<input id="fecha_inicio">
<input id="fecha_fin">
<input id="lugar">
<textarea id="tipo_trabajo"></textarea>
</div>

<div class="section">
<h3>ATS</h3>
<textarea id="pasos"></textarea>
<textarea id="maquinas"></textarea>
<textarea id="peligros"></textarea>
<textarea id="controles"></textarea>
</div>

<div class="section">
<h3>Herramientas</h3>
<input id="manuales">
<input id="electricas">
<input id="otros">
</div>

<div class="section">
<h3>Observaciones</h3>
<textarea id="observaciones"></textarea>
</div>

<div class="section">
<h3>Trabajadores</h3>
<div id="workers"></div>
</div>

<button onclick="generarATS()">Generar ATS</button>

<script>

const URL = "TU_URL_WEBAPP"; // tu apps script

function crearWorkers(lista=[]){
  let html="";
  for(let i=0;i<10;i++){
    let w = lista[i] || {};
    html += `
      <input id="n_${i}" value="${w.nombre||''}" placeholder="Nombre">
      <input id="c_${i}" value="${w.cedula||''}" placeholder="Cédula">
    `;
  }
  document.getElementById("workers").innerHTML = html;
}

// 🔥 CARGAR DATOS BASE DESDE APPS SCRIPT
async function cargarBase(){

  const res = await fetch(URL + "?getBase=1");
  const data = await res.json();

  fecha_inicio.value = data.fecha_inicio || "";
  fecha_fin.value = data.fecha_fin || "";
  lugar.value = data.lugar || "";
  tipo_trabajo.value = data.tipo_trabajo || "";

  pasos.value = data.pasos || "";
  maquinas.value = data.maquinas || "";
  peligros.value = data.peligros || "";
  controles.value = data.controles || "";

  manuales.value = data.manuales || "";
  electricas.value = data.electricas || "";
  otros.value = data.otros || "";

  observaciones.value = data.observaciones || "";

  crearWorkers(data.workers || []);
}

// 🔥 ENVIAR
async function generarATS(){

  const workers = [];

  for(let i=0;i<10;i++){
    workers.push({
      nombre:document.getElementById("n_"+i).value,
      cedula:document.getElementById("c_"+i).value
    });
  }

  const data = {
    fecha_inicio:fecha_inicio.value,
    fecha_fin:fecha_fin.value,
    lugar:lugar.value,
    tipo_trabajo:tipo_trabajo.value,
    pasos:pasos.value,
    maquinas:maquinas.value,
    peligros:peligros.value,
    controles:controles.value,
    manuales:manuales.value,
    electricas:electricas.value,
    otros:otros.value,
    observaciones:observaciones.value,
    workers
  };

  const res = await fetch(URL,{
    method:"POST",
    body: JSON.stringify(data)
  });

  const r = await res.json();

  alert("LISTO MIGUELITO 🚀");
  window.open(r.url);
}

cargarBase();

</script>

</body>
</html>
