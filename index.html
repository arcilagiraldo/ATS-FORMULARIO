<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATS</title>
</head>

<body>

<h2>ATS</h2>

<input id="fi" placeholder="Fecha inicio">
<input id="ff" placeholder="Fecha fin">
<input id="lugar" placeholder="Lugar">

<textarea id="tipo"></textarea>
<textarea id="pasos"></textarea>
<textarea id="maq"></textarea>
<textarea id="pel"></textarea>
<textarea id="con"></textarea>
<textarea id="obs"></textarea>

<button onclick="enviar()">GENERAR ATS</button>

<script>

const URL="TU_URL_GAS";

function enviar(){

let data={
fi:fi.value,
ff:ff.value,
lugar:lugar.value,
tipo:tipo.value,
pasos:pasos.value,
maq:maq.value,
pel:pel.value,
con:con.value,
obs:obs.value
};

fetch(URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(r=>{
alert("LISTO MIGUELITO 🚀");
window.open(r.url);
});

}

</script>

</body>
</html>
